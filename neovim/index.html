  <header>

  <main>
      <article>
        <h2>NeoVim</h2>
        <h4>Премещение</h4>
        <p><code>h</code> — влево</p>
        <p><code>j</code> — вниз</p>
        <p><code>k</code> — вверх</p>
        <p><code>l</code> — вправо</p>
        <h3>LazyVim</h3>
        <p>
          <a href="https://www.lazyvim.org/installation">Installation</a>
          Переключаться между редактором и проводником
          <code>Ctrl + h / l</code>
          Закрыть проводник
          <code>Space + e</code>
          Поиск файла внутри проекта
          <code>Space + Space</code>
          Переключаться между буферами
          <code>Shift + h / l</code>
        </p>
      </article>
  </main>
  <footer>
  </footer>
</body>
